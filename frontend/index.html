<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #273548;
      --border:    #334155;
      --primary:   #6366f1;
      --primary-h: #4f46e5;
      --success:   #10b981;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --danger:    #f87171;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 48px 16px 80px;
      line-height: 1.6;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #a5b4fc;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .header-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      background: #a5b4fc;
      border-radius: 50%;
    }

    .header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e2e8f0 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--muted);
      font-size: 1rem;
    }

    /* ── Layout ── */
    .container { max-width: 900px; margin: 0 auto; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    .card-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Input grid ── */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 640px) {
      .input-grid { grid-template-columns: 1fr; }
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      line-height: 1.6;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    textarea::placeholder { color: #475569; }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 10px 22px;
      transition: all 0.15s;
      letter-spacing: 0.01em;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #submitBtn {
      background: var(--primary);
      color: #fff;
      border: 1px solid transparent;
    }

    #submitBtn:not(:disabled):hover {
      background: var(--primary-h);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99,102,241,0.4);
    }

    #demoBtn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    #demoBtn:hover {
      border-color: var(--primary);
      color: #a5b4fc;
    }

    /* ── Loading ── */
    #loading {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .dots-wrap {
      display: flex;
      gap: 4px;
    }

    .dots-wrap span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
      animation: bounce 1.2s ease-in-out infinite;
      opacity: 0.3;
    }

    .dots-wrap span:nth-child(2) { animation-delay: 0.15s; }
    .dots-wrap span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Spinner in button ── */
    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    #error {
      display: none;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 14px;
    }

    /* ── Results ── */
    #results {
      display: none;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #results.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Score row */
    .score-row {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .circle-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      flex-shrink: 0;
    }

    .circle-wrap svg {
      transform: rotate(-90deg);
    }

    .circle-bg {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 8;
    }

    .circle-fill {
      fill: none;
      stroke: var(--primary);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      transition: stroke-dashoffset 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .circle-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .circle-score {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }

    .circle-label {
      font-size: 0.65rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .score-meta {
      flex: 1;
      min-width: 180px;
    }

    .score-meta h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    #reasoning {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Section titles */
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* Bullets */
    #bulletsList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #bulletsList li {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .bullet-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #a5b4fc;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    /* Cover letter */
    .cover-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    #copyBtn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      font-size: 0.75rem;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #copyBtn:hover {
      border-color: var(--primary);
      color: #a5b4fc;
    }

    #copyBtn.copied {
      border-color: var(--success);
      color: var(--success);
    }

    #coverLetter {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
      font-size: 0.875rem;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="header-badge">AI Powered</div>
      <h1>Job Application Agent</h1>
      <p>AI-powered resume tailoring &amp; cover letter generation</p>
    </header>

    <div class="card">
      <div class="card-label">Input</div>

      <div class="input-grid">
        <div class="field">
          <label for="jobDesc">Job Description</label>
          <textarea id="jobDesc" rows="12" placeholder="Paste the job description here..."></textarea>
        </div>
        <div class="field">
          <label for="resume">Your Resume</label>
          <textarea id="resume" rows="12" placeholder="Paste your resume here..."></textarea>
        </div>
      </div>

      <div class="actions">
        <button id="submitBtn">Analyze Match</button>
        <button id="demoBtn">Try Demo</button>
      </div>

      <div id="loading">
        <div class="dots-wrap">
          <span></span><span></span><span></span>
        </div>
        Analyzing your application...
      </div>

      <div id="error"></div>
    </div>

    <div id="results">

      <div class="card">
        <div class="card-label">Match Score</div>
        <div class="score-row">
          <div class="circle-wrap">
            <svg width="110" height="110" viewBox="0 0 110 110">
              <circle class="circle-bg" cx="55" cy="55" r="45"/>
              <circle class="circle-fill" id="circleFill" cx="55" cy="55" r="45"/>
            </svg>
            <div class="circle-text">
              <span class="circle-score" id="scoreValue">0</span>
              <span class="circle-label">/ 100</span>
            </div>
          </div>
          <div class="score-meta">
            <h3>Analysis Summary</h3>
            <div id="reasoning"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Tailored Resume Bullets</div>
        <ul id="bulletsList"></ul>
      </div>

      <div class="card">
        <div class="cover-header">
          <div class="section-title" style="margin-bottom:0;border:none;padding:0;">Cover Letter</div>
          <button id="copyBtn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
        </div>
        <div id="coverLetter"></div>
      </div>

    </div>
  </div>

  <script>
    const DEMO_JD = `Backend Engineer — Python & FastAPI

We are looking for a Backend Engineer with experience in Python, FastAPI, and building scalable APIs. Experience with async programming, PostgreSQL, and workflow automation tools is a plus. You will design microservices, integrate third-party APIs, and work in an agile team.

Responsibilities:
- Design and implement RESTful microservices using Python and FastAPI
- Integrate third-party APIs and workflow automation tools
- Write efficient async code for I/O-bound and concurrent workloads
- Collaborate with frontend and ML teams in an agile environment
- Own service reliability, observability, and performance

Requirements:
- Strong proficiency in Python and FastAPI
- Experience with async programming (asyncio, async/await)
- Familiarity with PostgreSQL and connection pooling
- Experience with workflow automation or orchestration tools
- Solid understanding of REST API design and microservices`;

    const DEMO_RESUME = `Harshit Sachdeva
harshitsachdeva03@gmail.com | github.com/harshitsachdeva03

EXPERIENCE

Backend Engineer — Samsung Research Bangalore (2024–Present)
- Building a Text-to-SQL agentic platform using LangGraph and FastAPI, enabling natural language querying over structured enterprise data
- Implemented asyncpg connection pooling and asyncio-based concurrency for parallel LLM calls, reducing end-to-end query latency by ~40%
- Designed SSE streaming pipeline between FastAPI backend and React/Vite frontend for real-time agent output
- Integrated Langfuse for LLM observability — tracking traces, token usage, and latency across agentic workflows
- Built and versioned REST APIs consumed by internal product teams

SKILLS
Python, FastAPI, LangGraph, asyncio, asyncpg, PostgreSQL, SSE, React, Vite, Langfuse, REST APIs, LLM integration, Docker

EDUCATION
B.Tech Electrical Engineering — IIT Delhi`;

    document.getElementById("demoBtn").addEventListener("click", () => {
      document.getElementById("jobDesc").value = DEMO_JD;
      document.getElementById("resume").value = DEMO_RESUME;
    });

    document.getElementById("copyBtn").addEventListener("click", () => {
      const text = document.getElementById("coverLetter").textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById("copyBtn");
        btn.classList.add("copied");
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove("copied");
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
        }, 2000);
      });
    });

    document.getElementById("submitBtn").addEventListener("click", async () => {
      const jobDesc = document.getElementById("jobDesc").value.trim();
      const resume = document.getElementById("resume").value.trim();
      const errorEl = document.getElementById("error");
      const loadingEl = document.getElementById("loading");
      const btn = document.getElementById("submitBtn");
      const resultsEl = document.getElementById("results");

      errorEl.style.display = "none";

      if (!jobDesc || !resume) {
        errorEl.textContent = "Please fill in both fields before analyzing.";
        errorEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analyzing...';
      loadingEl.style.display = "flex";
      resultsEl.classList.remove("visible");
      resultsEl.style.display = "none";

      try {
        const res = await fetch("http://localhost:5678/webhook-test/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ job_description: jobDesc, resume }),
        });

        if (!res.ok) throw new Error("non-200");

        const data = await res.json();
        renderResults(data);
      } catch {
        errorEl.textContent = "Something went wrong. Please try again.";
        errorEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyze Match";
        loadingEl.style.display = "none";
      }
    });

    function renderResults(data) {
      // Score
      document.getElementById("scoreValue").textContent = data.match_score;
      const circumference = 2 * Math.PI * 45;
      const offset = circumference - (data.match_score / 100) * circumference;
      setTimeout(() => {
        document.getElementById("circleFill").style.strokeDashoffset = offset;
      }, 50);

      // Bullets
      const list = document.getElementById("bulletsList");
      list.innerHTML = "";
      data.bullets.forEach((b, i) => {
        const li = document.createElement("li");
        li.innerHTML = `<span class="bullet-num">${i + 1}</span><span>${b}</span>`;
        list.appendChild(li);
      });

      // Cover letter & reasoning
      document.getElementById("coverLetter").textContent = data.cover_letter;
      document.getElementById("reasoning").textContent = data.reasoning;

      // Fade in
      const resultsEl = document.getElementById("results");
      resultsEl.style.display = "block";
      requestAnimationFrame(() => {
        requestAnimationFrame(() => resultsEl.classList.add("visible"));
      });
      resultsEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  </script>
</body>
</html>
