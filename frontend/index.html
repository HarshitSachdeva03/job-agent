<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 6px;
      color: #555;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 28px;
      margin-bottom: 24px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .field {
      margin-bottom: 20px;
    }

    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #1a1a1a;
      resize: vertical;
      line-height: 1.5;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    textarea:focus {
      outline: none;
      border-color: #4f46e5;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 10px 20px;
      transition: opacity 0.15s, background 0.15s;
    }

    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #submitBtn {
      background: #4f46e5;
      color: #fff;
    }

    #demoBtn {
      background: #f0f0f0;
      color: #333;
    }

    #error {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-top: 14px;
    }

    #results { display: none; }

    .score-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .score-badge {
      font-size: 2rem;
      font-weight: 700;
      color: #4f46e5;
      line-height: 1;
    }

    .score-label {
      font-size: 0.85rem;
      color: #555;
    }

    .score-bar-wrap {
      flex: 1;
      background: #ebebeb;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      background: #4f46e5;
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 10px;
    }

    #bulletsList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    #bulletsList li {
      display: flex;
      gap: 10px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    #bulletsList li::before {
      content: "▸";
      color: #4f46e5;
      flex-shrink: 0;
      margin-top: 1px;
    }

    #coverLetter {
      background: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 16px;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      color: #2a2a2a;
      margin-bottom: 24px;
    }

    #reasoning {
      font-size: 0.875rem;
      color: #555;
      line-height: 1.6;
      border-left: 3px solid #e0e0e0;
      padding-left: 12px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Job Agent</h1>
      <p>Paste a job description and your resume to get a tailored analysis.</p>
    </header>

    <div class="card">
      <div class="card-header">
        <h2>Input</h2>
        <button id="demoBtn">Demo Mode</button>
      </div>

      <div class="field">
        <label for="jobDesc">Job Description</label>
        <textarea id="jobDesc" rows="8" placeholder="Paste the job description here..."></textarea>
      </div>

      <div class="field">
        <label for="resume">Your Resume</label>
        <textarea id="resume" rows="10" placeholder="Paste your resume here..."></textarea>
      </div>

      <div class="actions">
        <button id="submitBtn">Analyze Match</button>
      </div>

      <div id="error"></div>
    </div>

    <div class="card" id="results">
      <div class="card-header">
        <h2>Results</h2>
      </div>

      <div class="score-row">
        <div>
          <div class="score-badge"><span id="scoreValue">0</span>%</div>
          <div class="score-label">Match Score</div>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar" id="scoreBar" style="width: 0%"></div>
        </div>
      </div>

      <div class="section-title">Tailored Bullets</div>
      <ul id="bulletsList"></ul>

      <div class="section-title">Cover Letter</div>
      <div id="coverLetter"></div>

      <div class="section-title">Reasoning</div>
      <div id="reasoning"></div>
    </div>
  </div>

  <script>
    const DEMO_JD = `Senior Software Engineer — Backend (Python)

We are looking for a Senior Backend Engineer to join our platform team. You will design and build scalable APIs, improve system reliability, and mentor junior engineers.

Responsibilities:
- Design and implement RESTful and gRPC APIs
- Own backend services written in Python (FastAPI / Django)
- Work closely with frontend and data teams
- Participate in on-call rotation and incident response
- Drive technical roadmap discussions

Requirements:
- 4+ years of backend engineering experience
- Strong proficiency in Python
- Experience with PostgreSQL, Redis, and message queues (Kafka / RabbitMQ)
- Familiarity with Docker and Kubernetes
- Strong communication and collaboration skills`;

    const DEMO_RESUME = `Harshit Sachdeva
harshitsachdeva03@gmail.com | github.com/harshitsachdeva03

EXPERIENCE

Backend Engineer — Acme Corp (2022–Present)
- Built and maintained Python (FastAPI) microservices handling 50M+ requests/day
- Reduced API p99 latency by 38% through query optimization and Redis caching
- Led migration of monolith to containerized services on Kubernetes
- Mentored 2 junior engineers; ran weekly code review sessions

Software Engineer — Startup XYZ (2020–2022)
- Developed Django REST APIs consumed by web and mobile clients
- Designed PostgreSQL schemas and wrote complex analytical queries
- Integrated Kafka for async event processing between services

SKILLS
Python, FastAPI, Django, PostgreSQL, Redis, Kafka, Docker, Kubernetes, REST, gRPC, Git

EDUCATION
B.Tech Computer Science — Delhi Technological University, 2020`;

    document.getElementById("demoBtn").addEventListener("click", () => {
      document.getElementById("jobDesc").value = DEMO_JD;
      document.getElementById("resume").value = DEMO_RESUME;
    });

    document.getElementById("submitBtn").addEventListener("click", async () => {
      const jobDesc = document.getElementById("jobDesc").value.trim();
      const resume = document.getElementById("resume").value.trim();
      const errorEl = document.getElementById("error");
      const btn = document.getElementById("submitBtn");

      errorEl.style.display = "none";

      if (!jobDesc || !resume) {
        errorEl.textContent = "Please fill in both fields before analyzing.";
        errorEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analyzing...';

      try {
        const res = await fetch("http://localhost:8000/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ job_description: jobDesc, resume }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        renderResults(data);
      } catch (err) {
        errorEl.textContent = err.message.includes("Failed to fetch")
          ? "Could not reach the backend. Make sure it's running on http://localhost:8000."
          : err.message;
        errorEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyze Match";
      }
    });

    function renderResults(data) {
      document.getElementById("scoreValue").textContent = data.match_score;
      document.getElementById("scoreBar").style.width = data.match_score + "%";

      const list = document.getElementById("bulletsList");
      list.innerHTML = "";
      data.bullets.forEach(b => {
        const li = document.createElement("li");
        li.textContent = b;
        list.appendChild(li);
      });

      document.getElementById("coverLetter").textContent = data.cover_letter;
      document.getElementById("reasoning").textContent = data.reasoning;

      const resultsEl = document.getElementById("results");
      resultsEl.style.display = "block";
      resultsEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  </script>
</body>
</html>
